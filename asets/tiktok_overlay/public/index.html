<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildfire Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hud-container">
        <div class="hud-line title" id="server-title">CS2.WILDFIRE.RO</div>
        <div class="hud-line">Players: <span id="players-val">--/--</span></div>
        <div class="hud-line">Map: <span id="map-val">--</span></div>
        <div class="hud-line">Clock: <span id="clock-val">--:--:--</span></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
